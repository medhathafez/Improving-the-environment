<!DOCTYPE html>
<html lang="ar" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>استخرج من النص - البيئة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* إصلاح مشاكل التمرير في الهواتف */
        html { overflow-x: hidden; }
        
        body {
            background-color: #f3f4f6; 
            min-height: 100vh;
            /* استخدام min-height بطريقة آمنة لـ iOS */
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px; 
            font-family: 'Calibri', sans-serif; 
            overflow-x: hidden;
        }

        /* شاشة البداية */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(243, 244, 246, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .welcome-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            font-family: sans-serif;
        }

        .welcome-box h2 {
            margin-bottom: 20px;
            color: #1f2937;
            font-size: 24px;
        }

        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            direction: ltr;
        }

        .input-group label {
            font-size: 18px;
            font-weight: bold;
            color: #374151;
            white-space: nowrap;
        }

        .input-group input {
            padding: 10px;
            font-size: 18px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            text-align: center;
            width: 100%;
            font-family: 'Calibri', sans-serif;
            font-weight: bold;
        }

        .input-group input:focus { border-color: #3b82f6; }

        .start-btn {
            padding: 10px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Calibri', sans-serif;
            width: 100%;
        }

        .start-btn:hover { background: #2563eb; }

        /* التطبيق الأساسي */
        .app-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1400px;
            background: white;
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            min-height: 95vh;
            position: relative;
            transition: filter 0.3s ease;
        }

        /* الكلاس المسؤول عن التمويه بأمان */
        .blurred-state {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
        }

        .sidebar {
            width: 320px;
            background-color: #ffffff;
            padding: 12px 15px; 
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb; 
            direction: ltr;
        }

        .score-stamp {
            display: none;
            color: #ef4444;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            border: 4px dashed #ef4444;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            transform: rotate(-5deg);
            font-family: 'Calibri', sans-serif;
            background-color: #fef2f2;
            line-height: 1.3;
        }

        .title-container { text-align: right; margin-bottom: 6px; direction: rtl; }
        
        .title {
            color: #000000;
            font-size: 20px; 
            font-weight: 900;
            position: relative;
            display: inline-block;
            padding-bottom: 5px;
        }
        
        .title::after { content: ''; position: absolute; bottom: 0; right: 0; width: 100%; height: 3px; background-color: #eab308; }
        
        .instruction { 
            font-size: 12px; 
            color: #4b5563; 
            margin-bottom: 10px; 
            text-align: left; 
            direction: ltr; 
            line-height: 1.3;
            font-family: sans-serif; 
        }
        
        .categories-list { display: flex; flex-direction: column; gap: 4px; direction: rtl; flex-grow: 1; } 
        
        .category-btn {
            display: flex; align-items: center; justify-content: flex-start; 
            padding: 6px 8px; 
            background-color: #ffffff;
            border: 2px solid #f3f4f6;
            border-radius: 8px;
            cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        
        .category-btn:hover { background-color: #f9fafb; }

        .category-btn.active {
            border-style: solid;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.05);
        }

        .category-btn::after {
            content: attr(data-en);
            position: absolute;
            bottom: 100%; 
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 6px;
            background: #1f2937;
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 50;
        }
        
        .category-btn::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 0px;
            border-width: 6px;
            border-style: solid;
            border-color: #1f2937 transparent transparent transparent;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 50;
        }
        
        .category-btn:hover::after, .category-btn:hover::before { opacity: 1; }
        
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 10px; flex-shrink: 0; }
        
        .cat-text-container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: flex-start; 
            width: 100%; 
            overflow: hidden;
        }
        
        .cat-label-container { display: flex; align-items: center; gap: 5px; }

        .cat-label { 
            font-family: 'Calibri', sans-serif;
            font-size: 16px; 
            color: #000000;
            font-weight: normal; 
            white-space: nowrap; 
        } 
        
        .cat-status { 
            font-size: 14px; 
            font-weight: bold;
            display: none; 
            white-space: nowrap;
        }

        .cat-counter { 
            font-size: 11px; 
            color: #6b7280; 
            margin-top: 0px; 
            font-family: sans-serif; 
        }

        .submit-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Calibri', sans-serif;
        }
        
        .submit-btn:hover { background-color: #2563eb; }

        .text-area {
            flex-grow: 1; 
            background-color: #fefce8; 
            padding: 20px 4vw; 
            direction: rtl;
        }

        .reading-text {
            font-family: 'Calibri', sans-serif;
            font-size: 27px; 
            line-height: 2; 
            color: #000000;
            text-align: justify;
            font-weight: bold; 
        }

        .word {
            cursor: pointer; padding: 2px 4px; border-radius: 6px; transition: all 0.3s ease;
            border-bottom: 3px solid transparent; display: inline-block;
        }
        
        .word:hover { background-color: rgba(0,0,0,0.05); }

        @media (max-width: 900px) {
            .app-container { flex-direction: column-reverse; height: auto; }
            .sidebar { width: 100%; border-right: none; border-top: 1px solid #e5e7eb; }
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-box">
            <h2>Welcome to the Activity</h2>
            <div class="input-group">
                <label>My name is:</label>
                <input type="text" id="student-name" placeholder="Type your name..." autocomplete="off">
            </div>
            <button class="start-btn" onclick="startQuiz()">Start</button>
        </div>
    </div>

    <div class="app-container blurred-state" id="capture-area">
        <aside class="sidebar">
            <div class="score-stamp" id="score-stamp">
                <div id="stamp-name"></div>
                <div id="stamp-score"></div>
            </div>
            <div class="title-container">
                <h2 class="title">اسْتَخْرِج مِن النَّصِّ</h2>
            </div>
            <p class="instruction">Click an item to hear it & select 1 matching word in the text. Click Submit when done.</p>
            
            <div class="categories-list" id="categories-container"></div>
            
            <button class="submit-btn" id="submit-btn" onclick="submitQuiz()">Submit</button>
        </aside>

        <main class="text-area">
            <div id="text-container" class="reading-text"></div>
        </main>
    </div>

    <script>
        let studentName = "";

        function startQuiz() {
            let nameInput = document.getElementById('student-name').value.trim();
            if (!nameInput) {
                alert("Please enter your name to start.");
                return;
            }
            studentName = nameInput;
            document.getElementById('welcome-screen').style.display = 'none';
            // إزالة الكلاس بدلاً من التعديل المباشر لتجنب أخطاء iOS
            document.getElementById('capture-area').classList.remove('blurred-state');
        }

        let categories = [
            { id: 'c1', label: 'جملة افتتاحية', en: 'Introductory sentence', color: '#3b82f6' },
            { id: 'c2', label: 'فعل مضارع', en: 'Present tense verb', color: '#22c55e' },
            { id: 'c3', label: 'فعل يدل على المستقبل', en: 'Future tense verb', color: '#f59e0b' },
            { id: 'c4', label: 'جمع تكسير', en: 'Broken plural', color: '#8b5cf6' },
            { id: 'c5', label: 'جمع مؤنث سالم', en: 'Sound feminine plural', color: '#06b6d4' },
            { id: 'c6', label: 'مفرد (مشاكل)', en: 'Singular', color: '#ef4444' }, 
            { id: 'c7', label: 'أسلوب تعجّب', en: 'Exclamation style', color: '#ec4899' },
            { id: 'c8', label: 'أسلوب تمني', en: 'Wishing style', color: '#14b8a6' }
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        shuffleArray(categories);

        const rawAnswers = {
            'c1': ['مَرْحَبًا', 'مِنَ الْمُمْكِنِ أَنْ نَقُولَ', 'وَمِنَ الْمَعْلُومِ أَنَّ', 'لِلْأَسَفِ'],
            'c2': ['تُوَاجِهُ', 'نَقُولَ', 'يُعَدُّ', 'تُؤَدِّي', 'تَنْتَشِرُ', 'أَرَى'],
            'c3': ['سَأُشَارِكُ', 'سَنَضَعُ'],
            'c4': ['الْمَصَانِعِ', 'الْأَنْهَارِ', 'الْبِحَارِ', 'السُّفُنِ', 'الْأَسْبَابِ', 'الْأَمْرَاضُ'],
            'c5': ['التَّحَدِّيَاتِ', 'النُّفَايَاتِ', 'مُخَلَّفَاتِ', 'لَافِتَاتِ'],
            'c6': ['مُشْكِلَةَ'], 
            'c7': ['حَقًّا مَا أَرْوَعَ هَذِهِ الْفِكْرَةَ!'], 
            'c8': ['أَرْجُو أَنْ أَرَى مَدِينَتِي أَفْضَلَ فِي الْمُسْتَقْبَلِ.']
        };

        function normalizeArabic(text) {
            return text.split(/\s+/).map(word => {
                let w = word.replace(/[\u064B-\u065F\u0640]/g, "") 
                           .replace(/[أإآٱ]/g, "ا") 
                           .replace(/ة/g, "ه") 
                           .replace(/[يى]/g, "ي") 
                           .replace(/[،.؛؟!]/g, "");
                
                if (w.length > 3 && w.startsWith("ال")) w = w.substring(2);
                else if (w.length > 4 && (w.startsWith("وال") || w.startsWith("فال") || w.startsWith("كال") || w.startsWith("بال"))) w = w.charAt(0) + w.substring(3);
                else if (w.length > 3 && w.startsWith("لل")) w = "ل" + w.substring(2);
                return w;
            }).join(" ").trim();
        }

        const correctAnswers = {};
        for (let catId in rawAnswers) correctAnswers[catId] = rawAnswers[catId].map(normalizeArabic);

        let rawText = `مَرْحَبًا أَنَا رَايْمَا طَالِبَةٌ فِي الْمَدْرَسَةِ الثَّانَوِيَّةِ بِمَدِينَةِ دِلْهِي فِي الْهِنْدِ. لِلْأَسَفِ هُنَاكَ الْكَثِيرُ مِنَ التَّحَدِّيَاتِ الَّتِي تُوَاجِهُ الْبِيئَةَ فِي مَدِينَتِي. <br> مِنَ الْمُمْكِنِ أَنْ نَقُولَ إِنَّ مُشْكِلَةَ تَلَوُّثِ الْمَاءِ هِيَ الْمُشْكِلَةُ الْأَكْثَرُ تَعْقِيدًا، وَمِنَ الْمَعْلُومِ أَنَّ السَّبَبَ هُوَ رَمْيُ النُّفَايَاتِ وَمُخَلَّفَاتِ الْمَصَانِعِ فِي الْأَنْهَارِ وَالْبِحَارِ، بِالْإِضَافَةِ إِلَى ذَلِكَ تَسَرُّبُ النَّفْطِ مِنَ السُّفُنِ، حَيْثُ يُعَدُّ مِنْ أَخْطَرِ الْأَسْبَابِ الَّتِي تُؤَدِّي إِلَى تَلَوُّثِ الْمَاءِ، وَبِالتَّالِي تَنْتَشِرُ الْأَمْرَاضُ الْخَطِيرَةُ. <br> وَمِنْ أَجْلِ حَيَاةٍ أَفْضَلَ، فِي الرَّبِيعِ الْقَادِمِ سَأُشَارِكُ فِي مُبَادَرَةٍ لِنَشْرِ الْوَعْيِ بِأَهَمِّيَّةِ الْمُحَافَظَةِ عَلَى الْمَاءِ، كَمَا سَنَضَعُ لَافِتَاتِ التَّوْعِيَةِ فِي كُلِّ مَكَانٍ فِي الْمَدِينَةِ. حَقًّا مَا أَرْوَعَ هَذِهِ الْفِكْرَةَ! أَرْجُو أَنْ أَرَى مَدِينَتِي أَفْضَلَ فِي الْمُسْتَقْبَلِ.`;

        const phrasesToWrap = [
            "مِنَ الْمُمْكِنِ أَنْ نَقُولَ",
            "وَمِنَ الْمَعْلُومِ أَنَّ",
            "حَقًّا مَا أَرْوَعَ هَذِهِ الْفِكْرَةَ!",
            "أَرْجُو أَنْ أَرَى مَدِينَتِي أَفْضَلَ فِي الْمُسْتَقْبَلِ."
        ];

        let tempText = rawText;
        phrasesToWrap.forEach((phrase, i) => tempText = tempText.replace(phrase, `__PHRASE${i}__`));
        let processedHTML = tempText.replace(/([\u0600-\u06FF]+)/g, '<span class="word">$1</span>');
        phrasesToWrap.forEach((phrase, i) => processedHTML = processedHTML.replace(`__PHRASE${i}__`, `<span class="word">${phrase}</span>`));

        const textContainer = document.getElementById('text-container');
        textContainer.innerHTML = processedHTML;

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        const categoriesContainer = document.getElementById('categories-container');
        let activeCategoryId = null;
        let activeColor = null;
        let userSelections = {};

        function playCategoryAudio(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/\(.*?\)/g, '').trim(); 
                let msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'ar-SA';
                window.speechSynthesis.speak(msg);
            }
        }

        categories.forEach(cat => {
            const btn = document.createElement('div');
            btn.className = 'category-btn';
            btn.id = `btn-${cat.id}`;
            btn.dataset.en = cat.en; 
            
            btn.onclick = () => {
                playCategoryAudio(cat.label);
                selectCategory(cat.id, cat.color, btn);
            };
            
            let possibleAnswersCount = rawAnswers[cat.id].length;

            btn.innerHTML = `
                <span class="dot" style="background-color: ${cat.color};"></span>
                <div class="cat-text-container">
                    <div class="cat-label-container">
                        <span class="cat-label">${cat.label}</span>
                        <span class="cat-status" id="status-${cat.id}"></span>
                    </div>
                    <span class="cat-counter" id="counter-${cat.id}">(${possibleAnswersCount} possible answers)</span>
                </div>
            `;
            categoriesContainer.appendChild(btn);
        });

        function selectCategory(id, color, btnElement) {
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('active');
                b.style.backgroundColor = "#ffffff";
                b.style.borderColor = "#f3f4f6";
            });

            btnElement.classList.add('active');
            btnElement.style.backgroundColor = hexToRgba(color, 0.3);
            btnElement.style.borderColor = color;

            activeCategoryId = id;
            activeColor = color;
        }

        const allWordSpans = document.querySelectorAll('.word');
        allWordSpans.forEach(span => {
            span.onclick = function() {
                if (!activeCategoryId) {
                    alert("الرجاء الضغط على المطلوب من القائمة الجانبية أولاً.");
                    return;
                }
                
                if (userSelections[activeCategoryId]) {
                    let prevSpan = userSelections[activeCategoryId];
                    prevSpan.style.backgroundColor = "";
                    prevSpan.style.borderBottomColor = "transparent";
                }

                userSelections[activeCategoryId] = this;
                this.style.backgroundColor = hexToRgba(activeColor, 0.3);
                this.style.borderBottomColor = activeColor;
                
                let statusEl = document.getElementById(`status-${activeCategoryId}`);
                statusEl.innerText = " (تم الاختيار)";
                statusEl.style.color = "#3b82f6";
                statusEl.style.display = 'inline-block';
            };
        });

        function revealAllAnswers() {
            allWordSpans.forEach(span => {
                let cleanWord = normalizeArabic(span.textContent);
                let matchedCats = categories.filter(cat => correctAnswers[cat.id].includes(cleanWord));
                
                if (matchedCats.length > 0) {
                    let catColor = matchedCats[0].color; 
                    span.style.borderBottom = `3px dashed ${catColor}`;
                    span.style.backgroundColor = hexToRgba(catColor, 0.15);
                }
            });
        }

        function submitQuiz() {
            let score = 0;
            let total = categories.length;
            
            categories.forEach(cat => {
                let statusEl = document.getElementById(`status-${cat.id}`);
                let selectedSpan = userSelections[cat.id];
                
                if (selectedSpan) {
                    let cleanWord = normalizeArabic(selectedSpan.textContent);
                    if (correctAnswers[cat.id].includes(cleanWord)) {
                        score++;
                        statusEl.innerText = ' ✔ صحيح';
                        statusEl.style.color = '#10b981';
                    } else {
                        statusEl.innerText = ' ✘ خطأ';
                        statusEl.style.color = '#ef4444';
                    }
                } else {
                    statusEl.innerText = ' ✘ لم يُجب';
                    statusEl.style.color = '#ef4444';
                }
                statusEl.style.display = 'inline-block';
            });

            let stamp = document.getElementById('score-stamp');
            document.getElementById('stamp-name').innerText = studentName;
            document.getElementById('stamp-score').innerText = `You got ${score}/${total}!`;
            stamp.style.display = 'block';

            document.getElementById('submit-btn').style.display = 'none';

            // تأخير بسيط لإعطاء الـ DOM وقت للتحديث
            setTimeout(() => {
                let targetElement = document.body;
                
                // حماية الكود من الانهيار إذا كان يعمل داخل Moodle أو Canvas
                try {
                    if (window.parent && window.parent.document && window.parent.document.body) {
                        targetElement = window.parent.document.body;
                    }
                } catch(e) {
                    console.log("Cross-Origin iframe. Capturing local body.");
                }

                // تجنب انهيار المتصفح في الهواتف بتقليل الـ scale للشاشات الصغيرة
                let isMobile = window.innerWidth <= 768;
                
                // التأكد من أن المكتبة قد تم تحميلها بالكامل قبل استدعائها
                if (typeof html2canvas === "function") {
                    html2canvas(targetElement, { 
                        scale: isMobile ? 1 : 2,
                        useCORS: true 
                    }).then(canvas => {
                        let link = document.createElement('a');
                        link.download = `${studentName.replace(/\s+/g, '_')}_Result.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        revealAllAnswers();
                    }).catch(err => {
                        console.error("Canvas error:", err);
                        revealAllAnswers();
                    });
                } else {
                    revealAllAnswers();
